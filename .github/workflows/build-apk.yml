# .github/workflows/build-apk.yml
# Gold Signal AI — Automatic Flutter APK build
name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Verify Flutter installation
        run: flutter doctor -v

      # ─── Regenerate Android project from scratch ───
      - name: Generate fresh Android project
        run: |
          rm -rf android/ test/
          flutter create --platforms=android --org com.goldsignal --project-name gold_signal_ai .

      # ─── Apply customizations via Python (reliable XML editing) ───
      - name: Apply Android customizations
        run: |
          python3 << 'PYEOF'
          import re

          # 1. Patch build.gradle — minSdkVersion 23
          with open('android/app/build.gradle', 'r') as f:
              gradle = f.read()
          gradle = gradle.replace(
              'minSdkVersion flutter.minSdkVersion',
              'minSdkVersion 23'
          )
          # Use debug signing for release builds
          gradle = gradle.replace(
              'signingConfig signingConfigs.release',
              'signingConfig signingConfigs.debug'
          )
          with open('android/app/build.gradle', 'w') as f:
              f.write(gradle)
          print("Patched build.gradle: minSdkVersion=23, debug signing")

          # 2. Patch AndroidManifest.xml — add permissions, AdMob, notifications
          with open('android/app/src/main/AndroidManifest.xml', 'r') as f:
              manifest = f.read()

          # Add permissions before <application
          permissions = """    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
    <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />
    <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />
    <uses-permission android:name="com.google.android.gms.permission.AD_ID" />

"""
          manifest = manifest.replace('<application', permissions + '<application')

          # Add AdMob App ID after <application ...> opening tag
          manifest = manifest.replace(
              '<application',
              '<application'
          )
          # Find the end of the <application ...> tag and insert meta-data
          manifest = re.sub(
              r'(<application[^>]*>)',
              r'\1\n        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713" />',
              manifest
          )

          # Add notification service and receiver after </activity>
          notification_components = """        <service android:name="com.dexterous.flutterlocalnotifications.ForegroundService" android:exported="false" android:stopWithTask="true" />
        <receiver android:exported="false" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver" />"""
          manifest = manifest.replace(
              '</activity>',
              '</activity>\n' + notification_components
          )

          with open('android/app/src/main/AndroidManifest.xml', 'w') as f:
              f.write(manifest)
          print("Patched AndroidManifest.xml: permissions, AdMob, notifications")

          # 3. Verify the XML is valid
          import xml.dom.minidom
          try:
              xml.dom.minidom.parse('android/app/src/main/AndroidManifest.xml')
              print("XML validation: PASSED")
          except Exception as e:
              print(f"XML validation FAILED: {e}")
              raise

          PYEOF

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK
        run: flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gold-signal-ai-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Create Release with APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
          name: Gold Signal AI ${{ github.ref_name }}
          body: |
            ## Gold Signal AI — ${{ github.ref_name }}

            ### Installation
            1. Download the APK file below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK file and install
            4. The app requires Android 6.0+ (API 23)

            ### Features
            - Real-time XAUUSD price and chart
            - Technical indicators (EMA, RSI, MACD, Bollinger Bands, ATR, S&R)
            - BUY/SELL/WAIT signal engine
            - Price alerts
            - Dark gold/black Material Design 3 theme

            ### Disclaimer
            This application is for educational and informational purposes only.
            It does not provide financial advice or guarantee trading results.
          draft: false
          prerelease: false
