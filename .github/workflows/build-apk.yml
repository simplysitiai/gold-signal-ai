# .github/workflows/build-apk.yml
# Gold Signal AI — Automatic Flutter APK build
name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.3'
          channel: 'stable'
          cache: true

      - name: Verify Flutter installation
        run: flutter doctor -v

      # ─── Regenerate Android project from scratch ───
      # Delete our manually-created android/ dir and let Flutter generate
      # the correct Gradle structure, then apply our customizations.
      - name: Generate fresh Android project
        run: |
          rm -rf android/
          flutter create --platforms=android --org com.goldsignal --project-name gold_signal_ai .

      # ─── Apply customizations ───
      - name: Apply Android customizations
        run: |
          # 1. Set minSdkVersion to 23 (required by google_mobile_ads)
          sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/' android/app/build.gradle

          # 2. Add AdMob, notification, and internet permissions to AndroidManifest
          # Insert permissions before the <application> tag
          sed -i '/<application/i\
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\
              <uses-permission android:name="android.permission.RECEIVE_BOOT_COMPLETED" />\
              <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\
              <uses-permission android:name="com.google.android.gms.permission.AD_ID" />' android/app/src/main/AndroidManifest.xml

          # 3. Add AdMob App ID meta-data inside <application>
          sed -i '/<application/a\
              <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713" />' android/app/src/main/AndroidManifest.xml

          # 4. Add notification service and receiver for price alerts
          sed -i '/<\/activity>/a\
              <service android:name="com.dexterous.flutterlocalnotifications.ForegroundService" android:exported="false" android:stopWithTask="true" />\
              <receiver android:exported="false" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver" />' android/app/src/main/AndroidManifest.xml

          # 5. Use debug signing for release builds (no keystore needed in CI)
          sed -i 's/signingConfig signingConfigs.release/signingConfig signingConfigs.debug/' android/app/build.gradle

          echo "=== AndroidManifest.xml ==="
          cat android/app/src/main/AndroidManifest.xml
          echo "=== build.gradle (minSdk) ==="
          grep minSdk android/app/build.gradle

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings || true

      - name: Build APK
        run: flutter build apk --debug --target-platform android-arm,android-arm64,android-x64

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: gold-signal-ai-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          retention-days: 30

      - name: Create Release with APK
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-debug.apk
          name: Gold Signal AI ${{ github.ref_name }}
          body: |
            ## Gold Signal AI — ${{ github.ref_name }}

            ### Installation
            1. Download the APK file below
            2. Enable "Install from unknown sources" on your Android device
            3. Open the APK file and install
            4. The app requires Android 6.0+ (API 23)

            ### Features
            - Real-time XAUUSD price and chart
            - Technical indicators (EMA, RSI, MACD, Bollinger Bands, ATR, S&R)
            - BUY/SELL/WAIT signal engine
            - Price alerts
            - Dark gold/black Material Design 3 theme

            ### Disclaimer
            This application is for educational and informational purposes only.
            It does not provide financial advice or guarantee trading results.
          draft: false
          prerelease: false
